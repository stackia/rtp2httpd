name: Submit to Ecosystem

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to submit (e.g., 3.5.1)"
        required: true
        type: string

jobs:
  submit-to-istore:
    runs-on: ubuntu-latest
    name: iStore
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OpenWrt packages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          TAG="v${VERSION}"

          echo "Downloading OpenWrt packages from release ${TAG}..."

          mkdir -p package-files
          cd package-files

          # Download all OpenWrt package formats from the release
          gh release download "${TAG}" --repo stackia/rtp2httpd --pattern "*.ipk"
          gh release download "${TAG}" --repo stackia/rtp2httpd --pattern "*.apk"

          echo "Downloaded files:"
          ls -la

      - name: Prepare openwrt-app-meta PR
        id: meta-pr
        env:
          GH_TOKEN: ${{ secrets.ISTORE_PAT }}
        run: |
          VERSION="${{ inputs.version }}"
          # Extract release number from package filenames
          RELEASE=""
          for package_file in package-files/rtp2httpd_${VERSION}-r*.ipk package-files/rtp2httpd-${VERSION}-r*.apk; do
            [ -e "${package_file}" ] || continue
            RELEASE=$(echo "${package_file}" | sed -n 's/.*-r\([0-9][0-9]*\)[_.].*/\1/p')
            [ -n "${RELEASE}" ] && break
          done
          if [ -z "$RELEASE" ]; then
            RELEASE="1"
          fi

          # Get the authenticated user's username
          GITHUB_USER=$(gh api user --jq .login)
          echo "GitHub user: ${GITHUB_USER}"

          # Fork the repository if not already forked
          echo "Forking linkease/openwrt-app-meta..."
          gh repo fork linkease/openwrt-app-meta --clone=false || true

          # Clone from the fork
          git clone https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_USER}/openwrt-app-meta.git
          cd openwrt-app-meta

          # Add upstream remote and fetch
          git remote add upstream https://github.com/linkease/openwrt-app-meta.git
          git fetch upstream

          # Create a new branch directly from upstream/main
          BRANCH_NAME="update-rtp2httpd-${VERSION}-r${RELEASE}"
          git checkout -b "${BRANCH_NAME}" upstream/main

          # Update Makefile
          MAKEFILE="applications/app-meta-rtp2httpd/Makefile"
          if [ -f "${MAKEFILE}" ]; then
            # Update PKG_VERSION
            sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${VERSION}/" "${MAKEFILE}"
            # Update PKG_RELEASE
            sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=${RELEASE}/" "${MAKEFILE}"
            echo "Updated Makefile with version ${VERSION} and release ${RELEASE}"
            cat "${MAKEFILE}"
          else
            echo "Error: Makefile not found at ${MAKEFILE}"
            exit 1
          fi

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit and push to fork
          git add .
          git commit -m "update rtp2httpd to ${VERSION}-r${RELEASE}"
          git push origin "${BRANCH_NAME}" --force

          # Create draft PR from fork to upstream and capture the URL
          META_PR_URL=$(gh pr create \
            --repo linkease/openwrt-app-meta \
            --title "update rtp2httpd to ${VERSION}-r${RELEASE}" \
            --body "Update rtp2httpd metadata to version ${VERSION}-r${RELEASE}

          This PR updates the package version in the app metadata.

          Automated PR from [stackia/rtp2httpd](https://github.com/stackia/rtp2httpd)" \
            --head "${GITHUB_USER}:${BRANCH_NAME}" \
            --draft)

          echo "meta_pr_url=${META_PR_URL}" >> $GITHUB_OUTPUT
          echo "Created meta PR: ${META_PR_URL}"

      - name: Prepare istore-repo PR
        id: repo-pr
        env:
          GH_TOKEN: ${{ secrets.ISTORE_PAT }}
          META_PR_URL: ${{ steps.meta-pr.outputs.meta_pr_url }}
        run: |
          VERSION="${{ inputs.version }}"
          # Extract release number from package filenames
          RELEASE=""
          for package_file in package-files/rtp2httpd_${VERSION}-r*.ipk package-files/rtp2httpd-${VERSION}-r*.apk; do
            [ -e "${package_file}" ] || continue
            RELEASE=$(echo "${package_file}" | sed -n 's/.*-r\([0-9][0-9]*\)[_.].*/\1/p')
            [ -n "${RELEASE}" ] && break
          done
          if [ -z "$RELEASE" ]; then
            RELEASE="1"
          fi

          # Get the authenticated user's username
          GITHUB_USER=$(gh api user --jq .login)
          echo "GitHub user: ${GITHUB_USER}"

          # Fork the repository if not already forked
          echo "Forking linkease/istore-repo..."
          gh repo fork linkease/istore-repo --clone=false || true

          # Clone from the fork
          git clone https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_USER}/istore-repo.git
          cd istore-repo

          # Add upstream remote and fetch
          git remote add upstream https://github.com/linkease/istore-repo.git
          git fetch upstream

          # Create a new branch directly from upstream/pending
          BRANCH_NAME="update-rtp2httpd-${VERSION}-r${RELEASE}"
          git checkout -b "${BRANCH_NAME}" upstream/pending

          copy_required() {
            local source_file="$1"
            local target_dir="$2"
            local label="$3"

            if [ ! -f "${source_file}" ]; then
              echo "Error: missing ${label}: ${source_file}"
              exit 1
            fi

            mkdir -p "${target_dir}"
            cp "${source_file}" "${target_dir}/"
            echo "Copied ${label}"
          }

          copy_required_as() {
            local source_file="$1"
            local target_file="$2"
            local label="$3"

            if [ ! -f "${source_file}" ]; then
              echo "Error: missing ${label}: ${source_file}"
              exit 1
            fi

            mkdir -p "$(dirname "${target_file}")"
            cp "${source_file}" "${target_file}"
            echo "Copied ${label}"
          }

          # IPK aarch64 uses aarch64_cortex-a53, while APK aarch64 uses aarch64_generic in istore-repo.
          for arch_pair in aarch64_cortex-a53:aarch64_generic x86_64:x86_64; do
            IPK_ARCH="${arch_pair%%:*}"
            APK_ARCH="${arch_pair##*:}"

            IPK_FILE="../package-files/rtp2httpd_${VERSION}-r${RELEASE}_${IPK_ARCH}.ipk"
            copy_required "${IPK_FILE}" "bin/packages/${IPK_ARCH}/nas" "rtp2httpd IPK for ${IPK_ARCH}"

            APK_FILE="../package-files/rtp2httpd-${VERSION}-r${RELEASE}_${APK_ARCH}.apk"
            APK_TARGET="bin/apks/${APK_ARCH}/nas/rtp2httpd-${VERSION}-r${RELEASE}.apk"
            copy_required_as "${APK_FILE}" "${APK_TARGET}" "rtp2httpd APK for ${APK_ARCH}"
          done

          # LuCI packages go to all/nas_luci/
          LUCI_IPK_TARGET_DIR="bin/packages/all/nas_luci"
          LUCI_APK_TARGET_DIR="bin/apks/all/nas_luci"

          LUCI_APP_IPK="../package-files/luci-app-rtp2httpd_${VERSION}-r${RELEASE}_all.ipk"
          copy_required "${LUCI_APP_IPK}" "${LUCI_IPK_TARGET_DIR}" "luci-app-rtp2httpd IPK"

          LUCI_APP_APK="../package-files/luci-app-rtp2httpd-${VERSION}-r${RELEASE}.apk"
          copy_required "${LUCI_APP_APK}" "${LUCI_APK_TARGET_DIR}" "luci-app-rtp2httpd APK"

          LUCI_I18N_IPK="../package-files/luci-i18n-rtp2httpd-zh-cn_${VERSION}_all.ipk"
          copy_required "${LUCI_I18N_IPK}" "${LUCI_IPK_TARGET_DIR}" "luci-i18n-rtp2httpd-zh-cn IPK"

          LUCI_I18N_APK="../package-files/luci-i18n-rtp2httpd-zh-cn-${VERSION}.apk"
          copy_required "${LUCI_I18N_APK}" "${LUCI_APK_TARGET_DIR}" "luci-i18n-rtp2httpd-zh-cn APK"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit and push to fork
          git add .
          git commit -m "update rtp2httpd to ${VERSION}-r${RELEASE}"
          git push origin "${BRANCH_NAME}" --force

          # Create draft PR from fork to upstream with meta PR link and capture the URL
          REPO_PR_URL=$(gh pr create \
            --repo linkease/istore-repo \
            --base pending \
            --title "update rtp2httpd to ${VERSION}-r${RELEASE}" \
            --body "更新 rtp2httpd 到版本 ${VERSION}-r${RELEASE}

          本 PR 同时上传 IPK 和 APK，覆盖 rtp2httpd (aarch64, x86_64)、luci-app-rtp2httpd 和 luci-i18n-rtp2httpd-zh-cn。

          自动化 PR 来自 [stackia/rtp2httpd](https://github.com/stackia/rtp2httpd)

          ---

          请完成以下表格：(方括号内填 \"x\" 以选中)
          * [x] 文件已经上传
          * [x] 确认PR的目标分支是\`pending\`
          * [x] 如果[元数据仓库](https://github.com/linkease/openwrt-app-meta/pulls)已经PR了请提供PR链接：
            * ${META_PR_URL}

          如果是全新软件：
          * [x] 是否开源软件？
          * [x] 代码仓库或者官方网站：https://github.com/stackia/rtp2httpd" \
            --head "${GITHUB_USER}:${BRANCH_NAME}" \
            --draft)

          echo "repo_pr_url=${REPO_PR_URL}" >> $GITHUB_OUTPUT
          echo "Created repo PR: ${REPO_PR_URL}"

      - name: Mark PRs as ready for review
        env:
          GH_TOKEN: ${{ secrets.ISTORE_PAT }}
          META_PR_URL: ${{ steps.meta-pr.outputs.meta_pr_url }}
          REPO_PR_URL: ${{ steps.repo-pr.outputs.repo_pr_url }}
        run: |
          echo "Converting draft PRs to ready for review..."

          # Extract PR numbers from URLs
          META_PR_NUMBER=$(echo "${META_PR_URL}" | grep -oP '\d+$')
          REPO_PR_NUMBER=$(echo "${REPO_PR_URL}" | grep -oP '\d+$')

          # Mark meta PR as ready
          echo "Marking openwrt-app-meta PR #${META_PR_NUMBER} as ready..."
          gh pr ready "${META_PR_NUMBER}" --repo linkease/openwrt-app-meta

          # Mark repo PR as ready
          echo "Marking istore-repo PR #${REPO_PR_NUMBER} as ready..."
          gh pr ready "${REPO_PR_NUMBER}" --repo linkease/istore-repo

          echo "Both PRs are now ready for review!"
