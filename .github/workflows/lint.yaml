name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Type check and lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - uses: astral-sh/setup-uv@v7

      - run: pnpm run type-check
      - run: pnpm run lint
